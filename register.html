<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RoyalTouch Beauty Salon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container register">
            <div class="auth-header">
                <div class="logo"><i class="fas fa-crown"></i></div>
                <h1>Create Account</h1>
                <p>Join Our Beauty Community</p>
            </div>

            <div id="alert" class="alert"></div>

            <form onsubmit="handleRegister(event)">
                <!-- User Type Selection -->
                <div class="form-group">
                    <label>Register as</label>
                    <div class="service-type-options" style="margin-top: 0.5rem;">
                        <div class="service-option active" onclick="selectUserType('client')" id="client-option">
                            <i class="fas fa-user"></i>
                            <p>Client</p>
                        </div>
                        <div class="service-option" onclick="selectUserType('admin')" id="admin-option">
                            <i class="fas fa-lock"></i>
                            <p>Admin</p>
                        </div>
                    </div>
                    <input type="hidden" id="userType" name="userType" value="client">
                </div>

                <!-- Admin Code Field -->
                <div class="form-group" id="adminCodeGroup" style="display: none;">
                    <label for="adminCode">Admin Code</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="adminCode" name="adminCode" placeholder="    Enter admin code">
                    </div>
                    <small style="color: var(--text-light); display: block; margin-top: 0.5rem;">
                        <i class="fas fa-info-circle"></i> Enter the admin code to register as an administrator
                    </small>
                </div>

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" name="name" placeholder="    Your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="    your@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" name="phone" placeholder="     +233 123 456 789">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="    Create a strong password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="    Re-enter your password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" name="terms" required>
                        I agree to the Terms & Conditions
                    </label>
                </div>

                <button type="submit" class="auth-btn">Create Account</button>
            </form>

            <div class="auth-link">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>

            <div class="auth-back">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // Admin Code (Change this to your secret code)
        const ADMIN_CODE = 'royaltouch2024';

        let users = JSON.parse(localStorage.getItem('users')) || [];

        function selectUserType(type) {
            const userTypeInput = document.getElementById('userType');
            const clientOption = document.getElementById('client-option');
            const adminOption = document.getElementById('admin-option');
            const adminCodeGroup = document.getElementById('adminCodeGroup');
            const adminCodeInput = document.getElementById('adminCode');

            userTypeInput.value = type;
            
            if (type === 'admin') {
                clientOption.classList.remove('active');
                adminOption.classList.add('active');
                adminCodeGroup.style.display = 'block';
                adminCodeInput.required = true;
            } else {
                adminOption.classList.remove('active');
                clientOption.classList.add('active');
                adminCodeGroup.style.display = 'none';
                adminCodeInput.required = false;
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const userType = document.getElementById('userType').value;
            const adminCode = document.getElementById('adminCode').value;
            const alertDiv = document.getElementById('alert');

            // Validation
            if (password !== confirmPassword) {
                showAlert(alertDiv, 'Passwords do not match!', 'danger');
                return;
            }

            if (users.some(u => u.email === email)) {
                showAlert(alertDiv, 'Email already registered!', 'danger');
                return;
            }

            // Check admin code if registering as admin
            if (userType === 'admin') {
                if (adminCode !== ADMIN_CODE) {
                    showAlert(alertDiv, 'Invalid admin code! Please try again.', 'danger');
                    return;
                }
            }

            // Create new user
            const newUser = {
                id: Date.now(),
                name,
                email,
                phone,
                password,
                userType,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            showAlert(alertDiv, 'Account created successfully! Redirecting to login...', 'success');

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }

        function showAlert(element, message, type) {
            element.textContent = message;
            element.className = 'alert show';
            if (type === 'danger') {
                element.classList.add('alert-danger');
            } else {
                element.classList.add('alert-success');
            }
        }
    </script>
</body>
</html>
